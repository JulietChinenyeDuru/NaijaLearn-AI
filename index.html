<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NaijaLearn-AI — an AI-powered learning platform." />
  <title>NaijaLearn-AI</title>
  <style>
    :root {
      --green: #008751;
      --green-dark: #006b40;
      --bg: #f4f6f5;
      --text: #1a1f1c;
      --muted: #6b7770;
      --border: #d9e0dc;
      --user-bubble: #008751;
      --bot-bubble: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--green);
      color: #fff;
      padding: 1rem 1.25rem;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; letter-spacing: 0.5px; }
    header p { font-size: 0.9rem; opacity: 0.9; margin-top: 0.2rem; }

    main {
      flex: 1;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 0.5rem 0;
    }

    .msg {
      max-width: 80%;
      padding: 0.65rem 0.9rem;
      border-radius: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.bot.pending { color: var(--muted); font-style: italic; }

    form {
      display: flex;
      gap: 0.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    #input {
      flex: 1;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
    }
    #input:focus { border-color: var(--green); }
    button {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 1.2rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: var(--green-dark); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    footer {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0.75rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>NaijaLearn-AI</h1>
    <p>An AI-powered learning platform</p>
  </header>

  <main>
    <div id="messages">
      <div class="msg bot">Hi! I'm your NaijaLearn-AI tutor. Ask me anything you'd like to learn.</div>
    </div>

    <form id="chat-form" autocomplete="off">
      <input id="input" type="text" placeholder="Type your question…" aria-label="Your message" required />
      <button id="send" type="submit">Send</button>
    </form>
  </main>

  <footer>
    &copy; 2026 Juliet Chinenye Duru
  </footer>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    const history = [];

    function addMessage(role, text, pending = false) {
      const el = document.createElement("div");
      el.className = "msg " + (role === "user" ? "user" : "bot") + (pending ? " pending" : "");
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      addMessage("user", message);
      history.push({ role: "user", content: message });
      input.value = "";
      sendBtn.disabled = true;

      const pendingEl = addMessage("bot", "Thinking…", true);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, history }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Request failed");

        pendingEl.classList.remove("pending");
        pendingEl.textContent = data.reply;
        history.push({ role: "assistant", content: data.reply });
      } catch (err) {
        pendingEl.classList.remove("pending");
        pendingEl.textContent = "Sorry, something went wrong: " + err.message;
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
